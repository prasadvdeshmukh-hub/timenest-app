<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Redirecting to Goals</title>
    <meta http-equiv="refresh" content="0; url=./goals.html?view=long" />
  </head>
  <body>
    <script>
      const params = new URLSearchParams(window.location.search);
      params.set("view", "long");
      window.location.replace(`./goals.html?${params.toString()}`);
    </script>
  </body>
</html>
