      <stop stop-color="#081224"/>
      <stop offset="0.52" stop-color="#0A1833"/>
      <stop offset="1" stop-color="#050A14"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 430) rotate(90) scale(320)">
      <stop stop-color="#00C8FF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#00C8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 560) rotate(90) scale(260)">
