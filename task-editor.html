<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TIMENEST Task Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="aurora aurora-left" aria-hidden="true"></div>
    <div class="aurora aurora-right" aria-hidden="true"></div>
    <main class="app-page-shell">
      <aside class="app-sidebar">
        <div class="sidebar-card panel"><a class="brand-link" href="./index.html"><div class="brand-cluster"><div class="brand-mark"><span class="brand-core"></span></div><div><p class="mini-label">Task Builder</p><h2>TIMENEST</h2><p class="brand-subline">Master Your Time. Achieve Your Goals.</p></div></div></a></div>
        <nav class="sidebar-nav">
          <a class="sidebar-link" href="./daily-tasks.html">Daily Tasks <span>09</span></a>
          <a class="sidebar-link" href="./task-detail.html">Task Detail <span>04</span></a>
          <a class="sidebar-link is-active" href="./task-editor.html">Task Editor <span>01</span></a>
        </nav>
      </aside>
      <section class="app-main">
        <article class="page-card panel task-editor-panel">
          <p class="mini-label">Task Editor</p>
          <h2 class="section-title">Create a task with date, time, recurrence, and reminders</h2>
          <div class="form-grid">
            <label class="field"><span>Task Name</span><input type="text" id="task-field-name" placeholder="Enter task name" /></label>
            <label class="field"><span>Priority</span><input type="text" id="task-field-priority" placeholder="Low / Medium / High" /></label>
            <label class="field"><span>Deadline Date</span><input type="date" id="task-field-date" /></label>
            <label class="field"><span>Time</span><input type="time" id="task-field-time" /></label>
            <label class="field full"><span>Notes</span><input type="text" id="task-field-notes" placeholder="Add notes, context, or a checklist" /></label>
          </div>
          <div class="task-editor-compact-stack">
            <fieldset class="compact-check-group">
              <legend>Frequency</legend>
              <div class="compact-check-row" aria-label="Frequency options">
                <label class="compact-check-chip">
                  <input type="checkbox" checked />
                  <span>None</span>
                </label>
                <label class="compact-check-chip">
                  <input type="checkbox" />
                  <span>Daily</span>
                </label>
                <label class="compact-check-chip">
                  <input type="checkbox" />
                  <span>Weekly</span>
                </label>
                <label class="compact-check-chip">
                  <input type="checkbox" />
                  <span>Monthly</span>
                </label>
                <label class="compact-check-chip">
                  <input type="checkbox" />
                  <span>Yearly</span>
                </label>
                <label class="compact-check-chip">
                  <input type="checkbox" />
                  <span>Custom Days</span>
                </label>
              </div>
            </fieldset>
            <fieldset class="compact-check-group">
              <legend>Preferred Notification</legend>
              <div class="compact-check-row" aria-label="Preferred notification options">
                <label class="compact-check-chip">
                  <input type="checkbox" checked />
                  <span>Push</span>
                </label>
                <label class="compact-check-chip">
                  <input type="checkbox" checked />
                  <span>In-App</span>
                </label>
                <label class="compact-check-chip">
                  <input type="checkbox" />
                  <span>Email</span>
                </label>
                <label class="compact-check-chip">
                  <input type="checkbox" />
                  <span>SMS</span>
                </label>
                <label class="compact-check-chip">
                  <input type="checkbox" />
                  <span>WhatsApp</span>
                </label>
              </div>
            </fieldset>
          </div>
          <div class="form-actions task-editor-actions"><span class="soft-pill" data-action="save-task">Save Task</span><span class="soft-pill" data-action="preview-reminder">Preview Reminder</span><a class="soft-pill" href="./subtask-editor.html">Add Subtask</a><span class="soft-pill" data-action="reset-task">Reset</span><span class="soft-pill" data-action="delete-task">Delete Task</span></div>
        </article>
      </section>
    </main>
    <nav class="bottom-tabbar" aria-label="Primary mobile navigation">
      <a class="tab-link" href="./index.html">Home</a>
      <a class="tab-link" href="./goals.html">Goals</a>
      <a class="tab-link is-active" href="./daily-tasks.html">Tasks</a>
      <a class="tab-link" href="./calendar.html?view=habits">Habits</a>
    </nav>
    <script src="./script.js"></script>
    <script src="./store-ui.js"></script>
  </body>
</html>
